<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Mirella Bays</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h2, h3 { color: #2d3436; border-bottom: 2px solid #d63031; padding-bottom: 10px; }
        
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #636e72; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; 
        }
        
        button { 
            background: #d63031; color: white; border: none; padding: 12px 20px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #b32d2e; }
        .btn-refresh { background: #2d3436; margin-bottom: 15px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f9f9f9; color: #636e72; }
        .nivel-tag { 
            background: #ffeaa7; color: #d35400; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Painel da Professora Mirella</h2>
        <p>Gerencie alunos e publique materiais no mural.</p>
    </div>

    <div class="card">
        <h3>➕ Cadastrar Novo Aluno</h3>
        <div class="grid-form">
            <div>
                <label>Nome do Aluno:</label>
                <input type="text" id="nomeAluno" placeholder="Ex: Hans Müller">
            </div>
            <div>
                <label>E-mail (Login):</label>
                <input type="email" id="emailAluno" placeholder="aluno@email.com">
            </div>
            <div>
                <label>Senha Provisória:</label>
                <input type="text" id="senhaAluno" placeholder="Ex: Alemão2024">
            </div>
            <div>
                <label>Nível Atual:</label>
                <select id="nivelAluno">
                    <option value="A1">A1 - Iniciante</option>
                    <option value="A2">A2 - Básico</option>
                    <option value="B1">B1 - Intermediário</option>
                    <option value="B2">B2 - Avançado</option>
                </select>
            </div>
            <button class="full-width" onclick="cadastrarAluno()">Salvar Aluno na Planilha</button>
        </div>
    </div>

    <div class="card">
        <h3>👥 Alunos Matriculados</h3>
        <button class="btn-refresh" onclick="carregarAlunos()">🔄 Atualizar Lista</button>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Nível</th>
                </tr>
            </thead>
            <tbody id="tabelaAlunos">
                </tbody>
        </table>
    </div>

    <div class="card">
        <h3>📝 Publicar no Mural</h3>
        <div class="grid-form">
            <div class="full-width">
                <label>E-mail do Aluno (Destinatário):</label>
                <input type="email" id="postEmail" placeholder="Copie o e-mail da lista acima">
            </div>
            <div>
                <label>Título do Conteúdo:</label>
                <input type="text" id="postTitulo" placeholder="Ex: Gramática: Verbos Modais">
            </div>
            <div>
                <label>Nível do Material:</label>
                <input type="text" id="postNivel" placeholder="Ex: A1">
            </div>
            <div class="full-width">
                <label>Link do Material (Google Drive/PDF):</label>
                <input type="text" id="postLink" placeholder="https://drive.google.com/...">
            </div>
            <div class="full-width">
                <label>Descrição/Instruções:</label>
                <textarea id="postDesc" rows="3"></textarea>
            </div>
            <button class="full-width" onclick="postarConteudo()">Publicar no Mural do Aluno</button>
        </div>
    </div>
</div>

<script>
    // COLOQUE AQUI A SUA URL DO APPS SCRIPT
    const urlScript = "SUA_URL_DO_SCRIPT_AQUI";

    // FUNÇÃO: BUSCAR ALUNOS DA PLANILHA
    async function carregarAlunos() {
        const tabela = document.getElementById('tabelaAlunos');
        tabela.innerHTML = "<tr><td colspan='3'>Carregando...</td></tr>";
        
        try {
            const response = await fetch(`${urlScript}?acao=LISTAR_ALUNOS`);
            const alunos = await response.json();
            tabela.innerHTML = ""; 
            
            alunos.forEach(aluno => {
                tabela.innerHTML += `
                    <tr>
                        <td>${aluno.nome}</td>
                        <td>${aluno.email}</td>
                        <td><span class="nivel-tag">${aluno.nivel}</span></td>
                    </tr>`;
            });
        } catch (err) {
            tabela.innerHTML = "<tr><td colspan='3'>Erro ao carregar dados.</td></tr>";
        }
    }

    // FUNÇÃO: CADASTRAR ALUNO
    async function cadastrarAluno() {
        const dados = {
            tipo: "CADASTRO_ALUNO",
            nome: document.getElementById('nomeAluno').value,
            email: document.getElementById('emailAluno').value,
            senha: document.getElementById('senhaAluno').value,
            nivel: document.getElementById('nivelAluno').value
        };

        const response = await fetch(urlScript, { method: 'POST', body: JSON.stringify(dados) });
        const texto = await response.text();
        alert(texto);
        carregarAlunos(); // Atualiza a lista automaticamente
    }

    // FUNÇÃO: POSTAR NO MURAL
    async function postarConteudo() {
        const dados = {
            tipo: "POSTAR_CONTEUDO",
            email: document.getElementById('postEmail').value,
            titulo: document.getElementById('postTitulo').value,
            descricao: document.getElementById('postDesc').value,
            link: document.getElementById('postLink').value,
            nivel: document.getElementById('postNivel').value
        };

        const response = await fetch(urlScript, { method: 'POST', body: JSON.stringify(dados) });
        const texto = await response.text();
        alert(texto);
    }

    // Carregar a lista assim que abrir a página
    window.onload = carregarAlunos;
</script>

</body>
</html>
