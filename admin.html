<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Mirella Bays</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #2d3436; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h2, h3, h4 { margin-top: 0; color: #2d3436; border-bottom: 2px solid #d63031; padding-bottom: 10px; }
        
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #636e72; font-size: 0.9em; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 1em;
        }
        
        button { 
            background: #d63031; color: white; border: none; padding: 12px 20px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%;
        }
        button:hover { background: #b32d2e; transform: translateY(-1px); }
        .btn-refresh { background: #2d3436; margin-bottom: 15px; width: auto; font-size: 0.8em; padding: 8px 15px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f9f9f9; color: #636e72; font-size: 0.9em; }
        .status-badge { background: #e1f5fe; color: #0288d1; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .nivel-tag { background: #ffeaa7; color: #d35400; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        
        .loading { font-style: italic; color: #b2bec3; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Painel Administrativo - Mirella Bays</h2>
        <p>Gerenciamento de alunos, aulas e materiais didáticos.</p>
    </div>

    <div class="card">
        <h3>📅 Agenda de Aulas</h3>
        <div class="grid-form">
            <div>
                <label>Aluno:</label>
                <input type="text" id="agendAluno" placeholder="Nome do Aluno">
            </div>
            <div>
                <label>Data:</label>
                <input type="date" id="agendData">
            </div>
            <div>
                <label>Horário:</label>
                <input type="time" id="agendHora">
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button onclick="agendarAula()">Agendar Aula</button>
            </div>
        </div>

        <h4 style="margin-top: 30px;">Próximas Aulas</h4>
        <button class="btn-refresh" onclick="carregarAgenda()">🔄 Atualizar Agenda</button>
        <table>
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Data</th>
                    <th>Hora</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabelaAgenda">
                <tr><td colspan="4" class="loading">Carregando agenda...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h3>📝 Publicar no Mural</h3>
        <div class="grid-form">
            <div class="full-width">
                <label>E-mail do Aluno:</label>
                <input type="email" id="postEmail" placeholder="Copie o e-mail da lista abaixo">
            </div>
            <div>
                <label>Título:</label>
                <input type="text" id="postTitulo" placeholder="Ex: Gramática A1">
            </div>
            <div>
                <label>Nível:</label>
                <input type="text" id="postNivel" placeholder="Ex: A1">
            </div>
            <div class="full-width">
                <label>Link do Material:</label>
                <input type="text" id="postLink" placeholder="Link do Google Drive ou PDF">
            </div>
            <div class="full-width">
                <label>Descrição:</label>
                <textarea id="postDesc" rows="2"></textarea>
            </div>
            <button class="full-width" onclick="postarConteudo()">Enviar ao Aluno</button>
        </div>
    </div>

    <div class="card">
        <h3>👥 Gestão de Alunos</h3>
        <div class="grid-form" style="margin-bottom: 20px;">
            <input type="text" id="nomeAluno" placeholder="Nome">
            <input type="email" id="emailAluno" placeholder="E-mail">
            <input type="text" id="senhaAluno" placeholder="Senha">
            <select id="nivelAluno">
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="B1">B1</option>
                <option value="B2">B2</option>
            </select>
            <button class="full-width" onclick="cadastrarAluno()">Cadastrar Aluno</button>
        </div>
        
        <button class="btn-refresh" onclick="carregarAlunos()">🔄 Atualizar Lista de Alunos</button>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Nível</th>
                </tr>
            </thead>
            <tbody id="tabelaAlunos">
                <tr><td colspan="3" class="loading">Carregando alunos...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // URL OFICIAL DO SEU SCRIPT
    const urlScript = "https://script.google.com/macros/s/AKfycby_b4ngv264zfhBp_XY4wPcVSsXSF0Q3D4Wft8IY0VCuiEKoFsNw8MDaMOYdW1ymfO0/exec";

    // CARREGAR LISTA DE ALUNOS
    async function carregarAlunos() {
        const tabela = document.getElementById('tabelaAlunos');
        try {
            const response = await fetch(`${urlScript}?acao=LISTAR_ALUNOS`);
            const alunos = await response.json();
            tabela.innerHTML = ""; 
            if (alunos.length === 0) {
                tabela.innerHTML = "<tr><td colspan='3'>Nenhum aluno cadastrado.</td></tr>";
                return;
            }
            alunos.forEach(aluno => {
                tabela.innerHTML += `<tr><td>${aluno.nome}</td><td>${aluno.email}</td><td><span class="nivel-tag">${aluno.nivel}</span></td></tr>`;
            });
        } catch (err) {
            tabela.innerHTML = "<tr><td colspan='3'>Erro ao carregar alunos. Verifique a aba 'Usuarios'.</td></tr>";
        }
    }

    // CARREGAR AGENDA
    async function carregarAgenda() {
        const tabela = document.getElementById('tabelaAgenda');
        try {
            const response = await fetch(`${urlScript}?acao=LISTAR_AGENDA`);
            const aulas = await response.json();
            tabela.innerHTML = ""; 
            if (aulas.length === 0) {
                tabela.innerHTML = "<tr><td colspan='4'>Nenhuma aula agendada.</td></tr>";
                return;
            }
            aulas.forEach(aula => {
                tabela.innerHTML += `<tr><td>${aula.aluno}</td><td>${aula.data}</td><td>${aula.hora}</td><td><span class="status-badge">${aula.status}</span></td></tr>`;
            });
        } catch (err) {
            tabela.innerHTML = "<tr><td colspan='4'>Erro ao carregar agenda. Verifique a aba 'Agenda'.</td></tr>";
        }
    }

    // CADASTRAR ALUNO
    async function cadastrarAluno() {
        const dados = {
            tipo: "CADASTRO_ALUNO",
            nome: document.getElementById('nomeAluno').value,
            email: document.getElementById('emailAluno').value,
            senha: document.getElementById('senhaAluno').value,
            nivel: document.getElementById('nivelAluno').value
        };
        const res = await fetch(urlScript, { method: 'POST', body: JSON.stringify(dados) });
        alert(await res.text());
        carregarAlunos();
    }

    // AGENDAR AULA
    async function agendarAula() {
        const dados = {
            tipo: "AGENDAMENTO",
            aluno: document.getElementById('agendAluno').value,
            data: document.getElementById('agendData').value,
            hora: document.getElementById('agendHora').value
        };
        const res = await fetch(urlScript, { method: 'POST', body: JSON.stringify(dados) });
        alert(await res.text());
        carregarAgenda();
    }

    // POSTAR MATERIAL
    async function postarConteudo() {
        const dados = {
            tipo: "POSTAR_CONTEUDO",
            email: document.getElementById('postEmail').value,
            titulo: document.getElementById('postTitulo').value,
            descricao: document.getElementById('postDesc').value,
            link: document.getElementById('postLink').value,
            nivel: document.getElementById('postNivel').value
        };
        const res = await fetch(urlScript, { method: 'POST', body: JSON.stringify(dados) });
        alert(await res.text());
    }

    // INICIALIZAÇÃO
    window.onload = () => {
        carregarAlunos();
        carregarAgenda();
    };
</script>

</body>
</html>
